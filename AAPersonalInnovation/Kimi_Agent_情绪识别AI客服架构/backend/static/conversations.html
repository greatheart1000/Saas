<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对话监控 - AI客服系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
        }
        .message-user {
            background: #3b82f6;
            border-radius: 12px 12px 0 12px;
        }
        .message-assistant {
            background: #475569;
            border-radius: 12px 12px 12px 0;
        }
        .sentiment-normal { color: #22c55e; }
        .sentiment-warning { color: #f59e0b; }
        .sentiment-critical { color: #ef4444; }
        .tab-active {
            background: #3b82f6;
            color: white;
        }
        .tab-inactive {
            background: #334155;
            color: #94a3b8;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- 头部 -->
        <header class="mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-white mb-2">💬 对话监控中心</h1>
                    <p class="text-slate-400">实时查看AI客服对话历史和统计</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="refreshData()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg flex items-center gap-2">
                        <span>🔄</span> 刷新
                    </button>
                    <a href="/knowledge.html" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg">
                        📚 知识库管理
                    </a>
                </div>
            </div>
        </header>

        <!-- 时间范围筛选 -->
        <div class="card rounded-xl p-4 mb-6">
            <div class="flex items-center gap-4">
                <span class="text-slate-400">时间范围：</span>
                <div class="flex gap-2" id="time-tabs">
                    <button onclick="setTimeRange('day')" id="tab-day" class="px-4 py-2 rounded-lg tab-active">今天</button>
                    <button onclick="setTimeRange('week')" id="tab-week" class="px-4 py-2 rounded-lg tab-inactive">最近7天</button>
                    <button onclick="setTimeRange('month')" id="tab-month" class="px-4 py-2 rounded-lg tab-inactive">最近30天</button>
                </div>
                <div class="flex-1"></div>
                <div class="text-slate-400 text-sm" id="time-range-display">显示今天的对话</div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="card rounded-xl p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-slate-400 text-sm">总会话数</p>
                        <p id="stat-sessions" class="text-3xl font-bold text-white mt-1">-</p>
                    </div>
                    <div class="text-4xl">💬</div>
                </div>
            </div>
            <div class="card rounded-xl p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-slate-400 text-sm">总消息数</p>
                        <p id="stat-messages" class="text-3xl font-bold text-white mt-1">-</p>
                    </div>
                    <div class="text-4xl">📨</div>
                </div>
            </div>
            <div class="card rounded-xl p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-slate-400 text-sm">转人工数</p>
                        <p id="stat-handoff" class="text-3xl font-bold text-white mt-1">-</p>
                    </div>
                    <div class="text-4xl">👥</div>
                </div>
            </div>
            <div class="card rounded-xl p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-slate-400 text-sm">转人工率</p>
                        <p id="stat-handoff-rate" class="text-3xl font-bold text-white mt-1">-</p>
                    </div>
                    <div class="text-4xl">📊</div>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左侧：会话列表 -->
            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <span>📋</span> 会话列表
                </h2>
                <div id="sessions-list" class="space-y-3 max-h-[600px] overflow-y-auto">
                    <div class="text-center py-8 text-slate-400">加载中...</div>
                </div>
            </div>

            <!-- 右侧：会话详情 -->
            <div class="lg:col-span-2 card rounded-xl p-6">
                <div id="session-detail">
                    <div class="text-center py-12 text-slate-400">
                        <div class="text-6xl mb-4">💭</div>
                        <p>选择一个会话查看详情</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let currentTimeRange = 'day';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            refreshData();
            setInterval(refreshData, 30000); // 30秒自动刷新
        });

        // 设置时间范围
        function setTimeRange(range) {
            currentTimeRange = range;

            // 更新Tab样式
            document.querySelectorAll('[id^="tab-"]').forEach(tab => {
                tab.className = 'px-4 py-2 rounded-lg tab-inactive';
            });
            document.getElementById(`tab-${range}`).className = 'px-4 py-2 rounded-lg tab-active';

            // 更新显示文字
            const rangeText = {
                'day': '显示今天的对话',
                'week': '显示最近7天的对话',
                'month': '显示最近30天的对话'
            };
            document.getElementById('time-range-display').textContent = rangeText[range];

            // 刷新数据
            refreshData();
        }

        // 刷新数据
        async function refreshData() {
            try {
                // 并行请求统计数据和会话列表
                const [stats, sessions] = await Promise.all([
                    fetch(`${API_BASE}/monitor/stats?time_range=${currentTimeRange}`).then(r => r.json()),
                    fetch(`${API_BASE}/monitor/sessions?time_range=${currentTimeRange}&limit=50`).then(r => r.json())
                ]);

                // 更新统计卡片
                updateStatCards(stats);

                // 更新会话列表
                updateSessionsList(sessions.sessions || []);

            } catch (error) {
                console.error('刷新数据失败:', error);
            }
        }

        // 更新统计卡片
        function updateStatCards(stats) {
            document.getElementById('stat-sessions').textContent = stats.total_conversations || 0;
            document.getElementById('stat-messages').textContent = stats.total_messages || 0;
            document.getElementById('stat-handoff').textContent = stats.handoff_count || 0;
            document.getElementById('stat-handoff-rate').textContent = (stats.handoff_rate || 0) + '%';
        }

        // 更新会话列表
        function updateSessionsList(sessions) {
            const container = document.getElementById('sessions-list');

            if (sessions.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-400">暂无会话记录</div>';
                return;
            }

            container.innerHTML = sessions.map(session => `
                <div onclick="loadSessionDetail('${session.id}')"
                     class="p-4 bg-slate-800 hover:bg-slate-700 rounded-lg cursor-pointer transition">
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-slate-400 text-sm">ID:</span>
                                <span class="text-white font-mono text-sm">${session.id.substring(0, 16)}...</span>
                            </div>
                            <div class="flex items-center gap-3 text-xs">
                                <span class="text-slate-400">📨 ${session.message_count || 0} 条</span>
                                <span class="text-slate-400">🕐 ${formatTime(session.created_at)}</span>
                                ${session.status === 'handed_off' ? '<span class="text-red-400">转人工</span>' : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 加载会话详情
        async function loadSessionDetail(sessionId) {
            const container = document.getElementById('session-detail');
            container.innerHTML = '<div class="text-center py-8 text-slate-400">加载中...</div>';

            try {
                const response = await fetch(`${API_BASE}/monitor/session/${sessionId}`);
                const session = await response.json();

                // 显示会话详情
                container.innerHTML = `
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl font-bold">📝 会话详情</h2>
                        <button onclick="refreshData()" class="px-3 py-1 bg-blue-600 hover:bg-blue-700 rounded text-sm">
                            🔄 刷新
                        </button>
                    </div>

                    <!-- 会话信息 -->
                    <div class="grid grid-cols-3 gap-4 mb-6">
                        <div class="bg-slate-800 rounded-lg p-4 text-center">
                            <div class="text-2xl font-bold text-white">${session.message_count || 0}</div>
                            <div class="text-slate-400 text-sm">消息数</div>
                        </div>
                        <div class="bg-slate-800 rounded-lg p-4 text-center">
                            <div class="text-2xl font-bold text-white">${session.user_message_count || 0}</div>
                            <div class="text-slate-400 text-sm">用户消息</div>
                        </div>
                        <div class="bg-slate-800 rounded-lg p-4 text-center">
                            <div class="text-2xl font-bold text-white">${formatTime(session.created_at)}</div>
                            <div class="text-slate-400 text-sm">创建时间</div>
                        </div>
                    </div>

                    <!-- 摘要 -->
                    ${session.summary ? `
                    <div class="bg-slate-800 rounded-lg p-4 mb-6">
                        <h3 class="font-bold mb-2">📌 对话摘要</h3>
                        <p class="text-slate-300">${session.summary.summary || '暂无摘要'}</p>
                        ${session.summary.key_facts && session.summary.key_facts.length > 0 ? `
                            <div class="mt-3">
                                <span class="text-slate-400">关键信息:</span>
                                <div class="flex flex-wrap gap-2 mt-2">
                                    ${session.summary.key_facts.map(fact => `
                                        <span class="px-2 py-1 bg-blue-900 rounded text-xs">${fact}</span>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                    ` : ''}

                    <!-- 消息列表 -->
                    <div class="space-y-4 max-h-[500px] overflow-y-auto">
                        ${(session.messages || []).map(msg => renderMessage(msg)).join('')}
                    </div>
                `;

            } catch (error) {
                console.error('加载会话详情失败:', error);
                container.innerHTML = '<div class="text-center py-8 text-red-400">加载失败</div>';
            }
        }

        // 渲染消息
        function renderMessage(msg) {
            const isUser = msg.role === 'user';
            const sentiment = msg.sentiment;

            return `
                <div class="flex ${isUser ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[80%] ${isUser ? 'message-user' : 'message-assistant'} px-4 py-3">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-sm opacity-70">${isUser ? '👤 用户' : '🤖 AI'}</span>
                            ${sentiment ? `
                                <span class="text-xs px-2 py-0.5 rounded sentiment-${sentiment.level || 'normal'}">
                                    ${sentiment.level || 'normal'}: ${Math.round((sentiment.score || 0) * 100)}%
                                </span>
                            ` : ''}
                        </div>
                        <p class="text-white">${msg.content}</p>
                        <div class="text-xs opacity-50 mt-1">${formatTime(msg.timestamp)}</div>
                    </div>
                </div>
            `;
        }

        // 辅助函数
        function formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
